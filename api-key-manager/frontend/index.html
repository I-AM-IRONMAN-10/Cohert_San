<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Key Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── AUTH VIEW ── -->
  <div id="authView" class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">🔑</div>
      <h1>API Key Manager</h1>
      <p class="auth-sub">Secure storage for your API credentials</p>

      <div class="tab-row">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>

      <div id="authStatus"></div>

      <form id="authForm" onsubmit="submitAuth(event)">
        <div class="form-group">
          <label for="authEmail">Email</label>
          <input id="authEmail" type="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="authPassword">Password</label>
          <input id="authPassword" type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="authSubmitBtn">Login</button>
      </form>
    </div>
  </div>

  <!-- ── APP VIEW ── -->
  <div id="appView" class="hidden">
    <header class="app-header">
      <div class="header-brand">🔑 API Key Manager</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </header>

    <main class="container">
      <section class="create-section">
        <h2>Add New Key</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="title">Key Title</label>
            <input id="title" type="text" placeholder="e.g. Stripe API Key">
          </div>
          <div class="form-group">
            <label for="secret">Secret</label>
            <input id="secret" type="password" placeholder="Paste your secret here">
          </div>
          <button id="createBtn" class="btn-primary" onclick="create()">+ Add Key</button>
        </div>
        <div id="status"></div>
      </section>

      <section class="keys-section">
        <h2>Stored Keys</h2>
        <div id="list"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
